<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Joke Generator</title>
    <script>
        async function generateJoke() {
            const response = await fetch('https://api.jokes.one/jod');
            const data = await response.json();
            document.getElementById('joke').innerText = data.contents.jokes[0].joke.text;
        }
    </script>
</head>
<body>
    <h1>Random Joke Generator</h1>
    <p id="joke">Press the button to get a joke!</p>
    <button onclick="generateJoke()">Get Joke</button>
</body>
</html>
