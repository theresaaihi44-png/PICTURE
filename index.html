<!DOCTYPE html>
<html>
<head>
    <title>Picture Gallery</title>
    <style>
        body {
            font-family: Arial, sans-serif;
        }
        .gallery {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        .gallery-item {
            text-align: center;
        }
        img {
            max-width: 100%;
            height: auto;
        }
    </style>
</head>
<body>
    <h1>Picture Gallery</h1>
    <div class="gallery">
        <div class="gallery-item">
            <img src="Parrots.jpg" alt="Parrots">
            <p>Parrots</p>
        </div>
        <div class="gallery-item">
            <img src="bird of paradise.jpg" alt="Bird of Paradise">
            <p>Bird of Paradise</p>
        </div>
        <div class="gallery-item">
            <img src="kangaroo.webp" alt="Kangaroo">
            <p>Kangaroo</p>
        </div>
        <div class="gallery-item">
            <img src="DYNAMIC ECOSYSTEM (2).jpg" alt="Dynamic Ecosystem">
            <p>Dynamic Ecosystem</p>
        </div>
        <div class="gallery-item">
            <img src="RAINFORESTS.jfif" alt="Rainforests">
            <p>Rainforests</p>
        </div>
        <div class="gallery-item">
            <img src="MOUNTAIN BIODIVERSITY.jpg" alt="Mountain Biodiversity">
            <p>Mountain Biodiversity</p>
        </div>
        <div class="gallery-item">
            <img src="Orchid Species.webp" alt="Orchid Species">
            <p>Orchid Species</p>
        </div>
        <div class="gallery-item">
            <img src="ENDMIC BIRDS.jfif" alt="Endemic Birds">
            <p>Endemic Birds</p>
        </div>
        <div class="gallery-item">
            <img src="MARINE LIFE.jpg" alt="Marine Life">
            <p>Marine Life</p>
        </div>
    </div>
</body>
</html>
