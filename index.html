<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Gallery</title>
    <style>
        .image-container {
            display: flex;
            flex-wrap: wrap;
        }
        figure {
            margin: 10px;
            cursor: pointer;
        }
        figcaption {
            text-align: center;
            margin-top: 5px;
        }
        .description {
            display: none;
            margin-top: 15px;
            font-style: italic;
        }
    </style>
</head>
<body>
    <h1>Image Gallery</h1>
    <div class="image-container">
        <figure onclick="showDescription('1')">
            <img src="image1.jpg" alt="Image 1" />
            <figcaption>Image 1</figcaption>
        </figure>
        <figure onclick="showDescription('2')">
            <img src="image2.jpg" alt="Image 2" />
            <figcaption>Image 2</figcaption>
        </figure>
        <figure onclick="showDescription('3')">
            <img src="image3.jpg" alt="Image 3" />
            <figcaption>Image 3</figcaption>
        </figure>
    </div>
    <div id="description-1" class="description">Description for Image 1</div>
    <div id="description-2" class="description">Description for Image 2</div>
    <div id="description-3" class="description">Description for Image 3</div>
    <script>
        function showDescription(id) {
            const descriptions = document.querySelectorAll('.description');
            descriptions.forEach(desc => desc.style.display = 'none');
            document.getElementById(`description-${id}`).style.display = 'block';
        }
    </script>
</body>
</html>
